# Spring Boot 主配置文件
# 证件照转化服务 - Photo Transform Service

spring:
  application:
    name: photo-transform-service
  
  # 配置环境（开发环境）
  profiles:
    active: dev

  # 文件上传配置
  servlet:
    multipart:
      # 单个文件最大大小（10MB）
      max-file-size: 10MB
      # 请求最大大小（100MB）
      max-request-size: 100MB
      # 文件写入磁盘的阈值（2KB）
      file-size-threshold: 2KB

  # 日期时间格式配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /
  # 压缩配置
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024

# 日志配置
logging:
  level:
    root: INFO
    com.phototransform: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/photo-transform.log

# 火山引擎 Seedream 配置
seedream:
  # API Key（从环境变量读取，生产环境禁止硬编码）
  apiKey: ${ARK_API_KEY}
  # API 端点
  baseUrl: "https://ark.cn-beijing.volces.com/api/v3"
  # 连接超时（10秒）
  connection-timeout: 10000
  # 读取超时（60秒）
  read-timeout: 60000

# 应用自定义配置
app:
  # 图片存储配置
  storage:
    # 存储类型（local:本地，oss:阿里云，cos:腾讯云）
    type: local
    # 本地存储路径
    local-path: uploads/
    # 访问URL前缀
    url-prefix: http://localhost:8080/uploads/
  
  # 任务处理配置
  task:
    # 任务过期时间（小时）
    expire-hours: 24
    # 清理过期任务cron表达式（每天凌晨2点）
    cleanup-cron: 0 0 2 * * ?
