# Spring Boot 主配置文件
# 证件照转化服务 - Photo Transform Service

spring:
  application:
    name: photo-transform-service
  
  # 配置环境（开发环境）
  profiles:
    active: dev

  # 文件上传配置
  servlet:
    multipart:
      # 单个文件最大大小（10MB）
      max-file-size: 10MB
      # 请求最大大小（100MB）
      max-request-size: 100MB
      # 文件写入磁盘的阈值（2KB）
      file-size-threshold: 2KB

  # 数据源配置（Supabase PostgreSQL）
  datasource:
    url: jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?user=postgres.tbwbftcrpdwojrmscfuk&sslmode=require
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 日期时间格式配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /
  # 压缩配置
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024

# 日志配置
logging:
  level:
    root: INFO
    com.phototransform: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/photo-transform.log

# 火山引擎 Seedream 配置
seedream:
  # API Key（从环境变量读取，生产环境禁止硬编码）
  apiKey: ${ARK_API_KEY}
  # API 端点
  baseUrl: "https://ark.cn-beijing.volces.com/api/v3"
  # 连接超时（10秒）
  connection-timeout: 10000
  # 读取超时（60秒）
  read-timeout: 60000

# Supabase 配置
supabase:
  storage:
    url: https://tbwbftcrpdwojrmscfuk.supabase.co
    serviceRoleKey: ${SUPABASE_SERVICE_ROLE_KEY}
    bucket: photoX

# Prompt 模板配置
prompt:
  templates:
    id-photo:
      system: |
        Turn this photo into a standard ID photo:
        - Background: solid {name} (RGB {rgb})
        - Person: centered, facing forward, symmetrical face
        - Show full head and shoulders
        - Lighting: even and natural
        - Clear face, sharp eyes, natural skin texture
        - Clothes: replace with black suit, white shirt, and black tie
        - Formal style, neat and professional
        - Consistent details: ears, shoulders, tie, collar must be aligned and symmetrical
        - Final style: official passport/ID photo, high resolution, clean and sharp
      negative: |
        No artistic effects
        No filters
        No distortions
        No asymmetry in face or body
        No extra objects or backgrounds
        No duplicated or missing body parts
        No clothing artifacts (broken tie, missing collar, misaligned suit)
        No cropped head or missing shoulders
        No unrealistic lighting
        No blurriness or low resolution

# 应用自定义配置
app:
  # 图片存储配置
  storage:
    # 存储类型（local/supabase）
    type: supabase
    # 本地存储路径（type=local 时使用）
    local-path: uploads/
    # 访问URL前缀（type=local 时使用）
    url-prefix: http://localhost:8080/uploads/
  
  # 任务处理配置
  task:
    # PROCESSING 任务最大存活时间（小时），超时标记 FAILED
    timeout-hours: 1
    # 已完成任务保留时间（小时），过期后不可查询
    expiry-hours: 24
    # 清理过期任务cron表达式（每小时）
    cleanup-cron: 0 0 * * * ?
